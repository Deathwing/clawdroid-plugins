name: Skills CI

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'

permissions:
  contents: write

jobs:
  publish-skills:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Generate skills.json from markdown frontmatter
        run: |
          node -e "
            const fs = require('fs');
            const REPO = 'https://raw.githubusercontent.com/\${{ github.repository }}/main';
            const skillFiles = fs.readdirSync('skills').filter(f => f.endsWith('.md') && f !== 'README.md');

            const skills = skillFiles.flatMap(file => {
              const content = fs.readFileSync('skills/' + file, 'utf8');
              const match = content.match(/^---\n([\s\S]+?)\n---/);
              if (!match) { console.warn('No frontmatter in', file); return []; }

              // Parse simple YAML frontmatter (key: value lines only)
              const meta = {};
              for (const line of match[1].split('\n')) {
                const kv = line.match(/^(\w+):\s*(.+)$/);
                if (kv) meta[kv[1]] = kv[2].trim();
              }
              if (!meta.id || !meta.name) { console.warn('Missing id/name in', file); return []; }

              return [{
                id: meta.id,
                name: meta.name,
                description: meta.description || '',
                author: meta.author || 'ClawDroid',
                category: meta.category || 'general',
                featured: meta.featured === 'true',
                icon_url: meta.icon_url || null,
                content_url: REPO + '/skills/' + file,
                download_count: 0,
              }];
            }).sort((a, b) => {
              if (a.featured !== b.featured) return a.featured ? -1 : 1;
              return a.name.localeCompare(b.name);
            });

            const catalog = {
              version: 1,
              commit: process.env.GITHUB_SHA ? process.env.GITHUB_SHA.slice(0, 7) : 'local',
              generated_at: new Date().toISOString(),
              skills,
            };
            fs.mkdirSync('release-artifacts', { recursive: true });
            fs.writeFileSync('release-artifacts/skills.json', JSON.stringify(catalog, null, 2));
            console.log('Generated skills.json with', skills.length, 'skills');
          "
        env:
          GITHUB_SHA: ${{ github.sha }}

      # ── Only publish on push to main ─────────────────────────────────────────
      - name: Publish rolling 'latest' release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest (rolling)"
          prerelease: true
          files: release-artifacts/skills.json
          body: |
            Auto-updated catalog reflecting the current state of `main`.

            **Commit:** ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
