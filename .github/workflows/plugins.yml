name: Plugins CI

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
  pull_request:
    branches: [main]
    paths:
      - 'plugins/**'

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # needed for changed-files detection

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'plugins/packages/*/package-lock.json'

      - name: Detect changed plugins
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi

          # If root SDK files changed, rebuild everything
          ROOT_CHANGED=$(git diff --name-only "$BASE" HEAD -- plugins/node.d.ts plugins/quickjs.d.ts plugins/manifest.schema.json plugins/builtin.json 2>/dev/null | head -1)
          if [ -n "$ROOT_CHANGED" ]; then
            CHANGED_PLUGINS=$(ls plugins/packages/ | tr '\n' ' ')
            echo "Root SDK files changed — rebuilding all plugins"
          else
            CHANGED_PLUGINS=$(git diff --name-only "$BASE" HEAD -- 'plugins/packages/**' 2>/dev/null \
              | grep '^plugins/packages/' \
              | cut -d/ -f3 \
              | sort -u \
              | tr '\n' ' ')
          fi

          echo "changed_plugins=$CHANGED_PLUGINS" >> $GITHUB_OUTPUT
          echo "Changed plugins: $CHANGED_PLUGINS"

      - name: Install dependencies
        run: |
          for plugin in plugins/packages/*/; do
            [ -f "${plugin}manifest.json" ] || continue
            npm install --prefix "$plugin" --silent
          done

      - name: Typecheck
        run: |
          FAILED=""
          for plugin in plugins/packages/*/; do
            [ -f "${plugin}manifest.json" ] || continue
            name="${plugin#plugins/packages/}"; name="${name%/}"
            echo "Typechecking $name..."
            npm run typecheck --prefix "$plugin" || FAILED="$FAILED $name"
          done
          if [ -n "$FAILED" ]; then
            echo "Typecheck failed for:$FAILED"
            exit 1
          fi

      - name: Test
        run: |
          FAILED=""
          for plugin in plugins/packages/*/; do
            [ -f "${plugin}manifest.json" ] || continue
            name="${plugin#plugins/packages/}"; name="${name%/}"
            echo "Testing $name..."
            npm run test --prefix "$plugin" || FAILED="$FAILED $name"
          done
          if [ -n "$FAILED" ]; then
            echo "Tests failed for:$FAILED"
            exit 1
          fi

      # ── Only run on push to main (not PRs) ───────────────────────────────────
      - name: Build changed plugins
        id: build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          CHANGED="${{ steps.changed.outputs.changed_plugins }}"
          if [ -z "$CHANGED" ]; then
            echo "No plugin changes detected — skipping build"
            exit 0
          fi
          for name in $CHANGED; do
            plugin="plugins/packages/$name/"
            [ -d "$plugin" ] || continue
            [ -f "${plugin}manifest.json" ] || continue
            echo "Building $name..."
            mkdir -p "${plugin}dist"
            npm run build:release --prefix "$plugin"
          done
          echo "built_plugins=$CHANGED" >> $GITHUB_OUTPUT

      - name: Package and publish rolling 'latest' release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.build.outputs.built_plugins != ''
        run: |
          REPO="https://github.com/${{ github.repository }}"
          BUNDLED=$(node -e "console.log(JSON.stringify(require('./plugins/builtin.json').bundled))")
          SHORT_SHA="${GITHUB_SHA::7}"
          mkdir -p release-artifacts

          # Build all plugins (not just changed) for a complete plugins.zip + plugins.json
          for plugin in plugins/packages/*/; do
            [ -f "${plugin}manifest.json" ] || continue
            name="${plugin#plugins/packages/}"; name="${name%/}"
            # Build if not already built
            if [ ! -f "${plugin}dist/index.js" ]; then
              mkdir -p "${plugin}dist"
              npm run build:release --prefix "$plugin"
            fi
            # Per-plugin zip
            zip -j "release-artifacts/${name}.zip" \
              "${plugin}dist/index.js" \
              "${plugin}manifest.json"
            sha256sum "release-artifacts/${name}.zip" > "release-artifacts/${name}.zip.sha256"
          done

          # Generate plugins.json
          node -e "
            const fs = require('fs');
            const bundled = ${BUNDLED};
            const plugins = fs.readdirSync('plugins/packages').flatMap(name => {
              const mpath = \`plugins/packages/\${name}/manifest.json\`;
              if (!fs.existsSync(mpath)) return [];
              const m = JSON.parse(fs.readFileSync(mpath, 'utf8'));
              return [{
                id: m.id,
                name: m.name,
                description: m.description,
                type: m.type,
                version: m.version || '0.0.0',
                author: m.author || 'Robert (Deathwing)',
                category: m.category || 'other',
                bundled: bundled.includes(name),
                featured: m.featured ?? bundled.includes(name),
                icon_url: m.icon_url || null,
                manifest_url: \`https://raw.githubusercontent.com/\${{ github.repository }}/main/plugins/packages/\${name}/manifest.json\`,
                bundle_url: \`${REPO}/releases/download/latest/\${name}.zip\`,
              }];
            }).sort((a, b) => a.name.localeCompare(b.name));

            const catalog = {
              version: 2,
              release: 'latest',
              commit: '${SHORT_SHA}',
              generated_at: new Date().toISOString(),
              plugins,
            };
            fs.writeFileSync('release-artifacts/plugins.json', JSON.stringify(catalog, null, 2));
            console.log('Generated plugins.json with', plugins.length, 'plugins');
          "

          # Combined plugins.zip
          mkdir -p all-plugins
          for plugin in plugins/packages/*/; do
            [ -f "${plugin}manifest.json" ] || continue
            name="${plugin#plugins/packages/}"; name="${name%/}"
            mkdir -p "all-plugins/${name}"
            cp "${plugin}dist/index.js" "all-plugins/${name}/index.js"
            cp "${plugin}manifest.json" "all-plugins/${name}/manifest.json"
          done
          cd all-plugins && zip -r ../release-artifacts/plugins.zip . && cd ..
          sha256sum release-artifacts/plugins.zip > release-artifacts/plugins.zip.sha256

          ls -lh release-artifacts/

      - name: Publish rolling 'latest' release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.build.outputs.built_plugins != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest (rolling)"
          prerelease: true
          files: release-artifacts/*
          body: |
            This is an automatically updated rolling release reflecting the current state of `main`.

            **Updated plugins:** ${{ steps.build.outputs.built_plugins }}
            **Commit:** ${{ github.sha }}

            For a pinned stable version, use a [versioned release](../../releases).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
